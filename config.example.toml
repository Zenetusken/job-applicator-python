# Job Applicator Configuration

# Profile
profile_name = "default"
resume_path = "/path/to/your/resume.pdf"
output_dir = "output"
log_level = "INFO"

# Browser
[browser]
headless = true
slow_mo = 0
timeout_ms = 30000
# Region the browser advertises to geo-aware sites (Indeed/LinkedIn).
# Leave empty to auto-detect from the host (locale + IANA timezone + Chrome UA).
# Set to pin a region, e.g. locale = "en-CA", timezone = "America/Toronto".
# locale = ""
# timezone = ""
# user_agent = ""   # empty = match the host's installed Chrome major version

# LLM (for AI cover letters)
[llm]
api_base = "http://localhost:8000/v1"
api_key = "not-needed-for-local"
model = "cyankiwi/Qwen3.5-4B-AWQ-4bit"
max_tokens = 1024
temperature = 0.7

# Targets
[target]
max_applications_per_day = 20
delay_between_applications_s = 2.0
# linkedin_email = "your-email@example.com"
# linkedin_password = "your-password"
# Indeed redirects by region; override to pin one, e.g. "ca.indeed.com" / "uk.indeed.com".
# Left at the default, the scraper auto-detects the regional site Indeed sends you to.
indeed_domain = "www.indeed.com"
