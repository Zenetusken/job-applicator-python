# Job Applicator Configuration

# Profile
# Your name as it should appear in cover-letter signatures. Leave as "default" or empty
# to derive it automatically from the parsed résumé.
profile_name = "default"
resume_path = "/path/to/your/resume.pdf"
# Example résumé/cover letter(s) whose writing style the AI should mimic. Supports a single
# file or comma-separated paths (e.g. "example1.txt,example2.pdf").
# style_guide_path = "cover_letter_example.txt"
style_guide_path = ""
output_dir = "output"
log_level = "INFO"

# Browser
[browser]
headless = true
slow_mo = 0
timeout_ms = 30000
# Region the browser advertises to geo-aware sites (Indeed/LinkedIn).
# Leave empty to auto-detect from the host (locale + IANA timezone + Chrome UA).
# Set to pin a region, e.g. locale = "en-CA", timezone = "America/Toronto".
# locale = ""
# timezone = ""
# user_agent = ""   # empty = match the host's installed Chrome major version

# LLM (for AI cover letters)
# job-applicator is a client of an OpenAI-compatible endpoint. To self-host locally,
# install the [serve] extra (vLLM 0.23.x, CUDA 13.0 wheel) and run scripts/serve-vllm.sh.
# The script defaults to this project's own .venv/bin/vllm, GPU_MEM=0.70,
# MAX_MODEL_LEN=8192, and ENFORCE_EAGER=1 (avoids a cudagraph-profiling OOM on
# 12 GB desktop GPUs).
[llm]
api_base = "http://localhost:8000/v1"
api_key = "not-needed-for-local"
# Default base model (genuine AWQ 4-bit, ~6.1 GB, fits the 12 GB card alongside the
# embeddings). The smaller cyankiwi/Qwen3.5-4B-AWQ-4bit is a pinnable fallback.
model = "Qwen/Qwen3-8B-AWQ"
# Output language for the generated CV + cover letter: "auto" mirrors the job
# posting's language (FR/EN heuristic), or force "en" / "fr". The two documents
# always resolve the SAME language, so one application never mixes them.
language = "auto"
# Upper bound per completion. 4096 fits full résumé tailoring; cover letters and
# style analysis need less (style analysis self-caps at 1024 internally). Setting
# this below ~4096 can truncate tailored résumés. Matches the built-in default.
max_tokens = 4096
temperature = 0.7

# Targets
[target]
max_applications_per_day = 20
delay_between_applications_s = 2.0
# linkedin_email = "your-email@example.com"
# linkedin_password = "your-password"
# Empty = auto-detect the regional Indeed host from your timezone (e.g. ca.indeed.com
# in Canada). Set to pin one, e.g. "ca.indeed.com" / "uk.indeed.com" / "www.indeed.com".
indeed_domain = ""

# Output format and PDF templates
[output]
default_format = "txt"
resume_template = "modern"
cover_letter_template = "modern"
# template_dir = "/path/to/custom/templates"
